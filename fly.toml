# Fly.io config for the hosted taskweft MCP server.
# TLS is terminated at Fly's edge (force_https); the app serves plain HTTP on 8080.
# Scale-to-zero keeps idle cost near $0 (a 256mb shared-cpu-1x is ~$2/mo always-on).

app = "taskweft-mcp"
primary_region = "sjc"

[build]
  dockerfile = "Containerfile"

[env]
  PORT = "8080"
  # Stable issuer / OAuth metadata base (TLS terminates at Fly's edge).
  PUBLIC_BASE_URL = "https://taskweft-mcp.fly.dev"
  # Non-secret whitelist. Bare = GitHub login; @name / org:name = org membership.
  # Org entries make the app request `read:org` at authorization time.
  TASKWEFT_MCP_GH_ALLOW = "fire,@taskweft,@V-Sekai-fire"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
